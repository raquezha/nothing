services:
  headroom:
    image: ghcr.io/chopratejas/headroom:latest
    container_name: nothing-headroom
    restart: unless-stopped
    ports:
      - "127.0.0.1:8788:8787"
    environment:
      HEADROOM_HOST: "0.0.0.0"
      HEADROOM_PORT: "8787"
      HEADROOM_TELEMETRY: "off"
      HEADROOM_SAVINGS_PATH: "/data/proxy_savings.json"
    volumes:
      - "${HOME}/.local/share/headroom:/data"
    command: ["--host", "0.0.0.0", "--port", "8787", "--no-cache"]
