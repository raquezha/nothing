name: Publish Packages
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip actual publish)"
        required: false
        default: "false"
        type: boolean

jobs:
  release:
    name: Version and publish
    runs-on: ubuntu-latest
    permissions:
      contents: write      # to push version bump commits + tags
      pull-requests: write # to open the Version PR
      id-token: write      # for npm provenance

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0   # changesets needs full history

      - name: Setup Node.js with NPM registry
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build all packages
        run: npm run build --workspaces --if-present

      - name: Detect whether release is needed
        id: release-check
        if: ${{ inputs.dry_run != 'true' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail

          pending_changesets=$(find .changeset -maxdepth 1 -name '*.md' ! -name 'README.md' | wc -l | tr -d ' ')
          if [ "$pending_changesets" != "0" ]; then
            echo "Pending changesets detected on main."
            echo "Changesets PR creation is blocked in this repo because GitHub Actions cannot open PRs."
            echo "Skipping publish workflow until repo setting 'Allow GitHub Actions to create and approve pull requests' is enabled or release flow is redesigned."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "blocked_reason=pending_changesets_pr_permissions" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          should_release=false
          for pkg_json in packages/*/package.json; do
            name=$(node -e "console.log(require('./$pkg_json').name)")
            version=$(node -e "console.log(require('./$pkg_json').version)")
            latest=$(npm dist-tag ls "$name" 2>/dev/null | awk '/^latest:/ {print $2}' || true)
            echo "$name local=$version npm-latest=${latest:-missing}"
            if [ "$latest" != "$version" ]; then
              should_release=true
            fi
          done

          echo "should_release=$should_release" >> "$GITHUB_OUTPUT"
          echo "blocked_reason=none" >> "$GITHUB_OUTPUT"

      - name: Create Version PR or publish
        if: ${{ inputs.dry_run != 'true' && steps.release-check.outputs.should_release == 'true' }}
        uses: changesets/action@v1
        with:
          publish: npm run release
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Skip publish summary
        if: ${{ inputs.dry_run != 'true' && steps.release-check.outputs.should_release != 'true' && steps.release-check.outputs.blocked_reason == 'none' }}
        run: echo "All package versions already match npm latest dist-tags. Nothing to publish."

      - name: Blocked publish summary
        if: ${{ inputs.dry_run != 'true' && steps.release-check.outputs.blocked_reason == 'pending_changesets_pr_permissions' }}
        run: |
          echo "Publish skipped: pending changesets require a Version PR, but GitHub Actions PR creation is disabled for this repo."
          echo "Enable: Settings → Actions → General → Workflow permissions → Allow GitHub Actions to create and approve pull requests."

      - name: Dry run summary
        if: ${{ inputs.dry_run == 'true' }}
        run: |
          echo "🧪 Dry run — no packages published."
          echo ""
          echo "Packages and current versions:"
          for pkg in packages/notrace packages/noleaks packages/nosearch packages/noagy packages/nofooter; do
            name=$(node -e "console.log(require('./$pkg/package.json').name)")
            version=$(node -e "console.log(require('./$pkg/package.json').version)")
            echo "  → $name@$version"
          done
          echo ""
          echo "Pending changesets:"
          ls .changeset/*.md 2>/dev/null | grep -v README || echo "  (none)"
