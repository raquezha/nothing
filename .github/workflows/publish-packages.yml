name: Publish Packages
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip actual publish)"
        required: false
        default: "false"
        type: boolean

jobs:
  release:
    name: Version and publish
    runs-on: ubuntu-latest
    permissions:
      contents: write      # to push version bump commits + tags
      pull-requests: write # to open the Version PR
      id-token: write      # for npm provenance

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0   # changesets needs full history

      - name: Setup Node.js with NPM registry
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build all packages
        run: npm run build --workspaces --if-present

      - name: Validate npm token
        if: ${{ inputs.dry_run != 'true' }}
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NPM_TOKEN:-}" ]; then
            echo "NPM_TOKEN is required for real package publishing." >&2
            exit 1
          fi

      - name: Create Version PR or publish
        if: ${{ inputs.dry_run != 'true' }}
        uses: changesets/action@v1
        with:
          publish: npm run release
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Dry run summary
        if: ${{ inputs.dry_run == 'true' }}
        run: |
          echo "🧪 Dry run — no packages published."
          echo ""
          echo "Packages and current versions:"
          for pkg in packages/notrace packages/noleaks packages/nosearch packages/antigravity packages/nofooter packages/noheadroom packages/workflows/norpiv; do
            name=$(node -e "console.log(require('./$pkg/package.json').name)")
            version=$(node -e "console.log(require('./$pkg/package.json').version)")
            echo "  → $name@$version"
          done
          echo ""
          echo "Pending changesets:"
          ls .changeset/*.md 2>/dev/null | grep -v README || echo "  (none)"
