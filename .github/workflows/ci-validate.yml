name: CI Validate
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  package-pr-links:
    name: Package PR issue link policy
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.head_ref != 'changeset-release/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate package PR issue links
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: node scripts/validate-pr-package-links.mjs

  changeset-status:
    name: Changeset status
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.head_ref != 'changeset-release/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Require changeset for package changes
        run: npm run changeset:status

  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Run shellcheck on shell scripts
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: "."
          ignore_paths: "node_modules"
          severity: warning

  lint-json:
    name: Lint JSON configs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Validate settings.json
        run: node -e "JSON.parse(require('fs').readFileSync('config/settings.json','utf8')); console.log('settings.json ✓')"

      - name: Validate mindsets.json
        run: node -e "JSON.parse(require('fs').readFileSync('config/mindsets.json','utf8')); console.log('mindsets.json ✓')"

      - name: Validate package.json files
        run: |
          for f in packages/*/package.json; do
            node -e "JSON.parse(require('fs').readFileSync('$f','utf8')); console.log('$f ✓')"
          done

  verify-bootstrap:
    name: Verify bootstrap (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Verify bootstrap dry-run
        run: ./bootstrap.sh --dry-run

  build-packages:
    name: Build TypeScript packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build all packages
        run: npm run build --workspaces --if-present

      - name: Run repository verification tests
        run: npm test

      - name: Validate notrace HTML output generation
        run: npm run verify:notrace
